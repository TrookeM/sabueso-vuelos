<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Panel del Sabueso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-body-tertiary">
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary"><i class="bi bi-radar"></i> Sabueso de Vuelos</h1>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 bg-dark p-4 text-white">
                <form id="configForm">
                    <div class="mb-3">
                        <label class="form-label">Orígenes (IATA)</label>
                        <input type="text" class="form-control" id="origenes" value="{{ config.origenes }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Destino (IATA)</label>
                        <input type="text" class="form-control" id="destino" value="{{ config.destino }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha Ida</label>
                        <input type="date" class="form-control" id="fecha_ida" value="{{ config.fecha_ida }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha Vuelta</label>
                        <input type="date" class="form-control" id="fecha_vuelta" value="{{ config.fecha_vuelta }}">
                    </div>
                    <div class="row mb-4">
                        <div class="col-6"><label>Pax</label><input type="number" class="form-control" id="pasajeros" value="{{ config.pasajeros }}"></div>
                        <div class="col-6"><label>Max €</label><input type="number" class="form-control" id="precio_maximo_pp" value="{{ config.precio_maximo_pp }}"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-2 fw-bold"><i class="bi bi-save"></i> Guardar Config</button>
                    <button type="button" id="btnBuscar" class="btn btn-success w-100 mb-2 fw-bold"><i class="bi bi-search"></i> Buscar Ahora</button>
                    <button type="button" id="btnHistorial" class="btn btn-secondary w-100 mb-2 fw-bold" data-bs-toggle="modal" data-bs-target="#modalHistorial"><i class="bi bi-clock-history"></i> Ver Historial de Búsquedas</button>
                    <button type="button" id="btnTestTelegram" class="btn btn-outline-info w-100 fw-bold"><i class="bi bi-telegram"></i> Probar Telegram</button>
                </form>
                <div id="alertMsg" class="alert mt-3 d-none"></div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card bg-dark shadow-sm border-0 p-0 overflow-hidden">
                <div id="loading" class="text-center py-5 d-none"><div class="spinner-border text-primary"></div></div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0" id="tablaResultados">
                        <thead><tr><th>Ruta/Fecha</th><th>Aerolínea</th><th>Estado</th><th>Precio</th><th>Acción</th></tr></thead>
                        <tbody><tr><td colspan="5" class="text-center py-5">Usa "Buscar Ahora" para ver resultados.</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalHistorial" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-journal-text"></i> Registro Automático del Bot</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
            <table class="table table-dark table-sm table-striped" id="tablaHistorial">
                <thead><tr><th>Fecha y Hora</th><th class="text-center">Vuelos Hallados</th><th>Mejor Precio</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Guardar Configuración
    document.getElementById('configForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            origenes: document.getElementById('origenes').value.toUpperCase(),
            destino: document.getElementById('destino').value.toUpperCase(),
            fecha_ida: document.getElementById('fecha_ida').value,
            fecha_vuelta: document.getElementById('fecha_vuelta').value,
            pasajeros: document.getElementById('pasajeros').value,
            precio_maximo_pp: document.getElementById('precio_maximo_pp').value
        };
        const res = await fetch('/api/guardar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        const result = await res.json();
        const alertBox = document.getElementById('alertMsg');
        alertBox.textContent = result.message; alertBox.className = 'alert mt-3 alert-success'; alertBox.classList.remove('d-none');
        setTimeout(() => alertBox.classList.add('d-none'), 3000);
    });

    // Buscar Ahora
    document.getElementById('btnBuscar').addEventListener('click', async () => {
        document.getElementById('loading').classList.remove('d-none');
        document.querySelector('#tablaResultados tbody').innerHTML = '';
        const res = await fetch('/api/buscar');
        const data = await res.json();
        document.getElementById('loading').classList.add('d-none');
        const tbody = document.querySelector('#tablaResultados tbody');
        
        if (data.error) { tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">${data.mensaje}</td></tr>`; return; }
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Sin resultados por debajo de tu presupuesto.</td></tr>'; return; }
        
        data.forEach(v => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${v.origen} ➜ ${v.destino}</b><br><small>${v.fecha_detectada}</small></td><td>${v.aerolinea}</td><td>${v.estado_precio}</td><td><span class="badge bg-success">${v.precio_pp} €</span></td><td><a href="${v.enlace}" target="_blank" class="btn btn-sm btn-primary"><i class="bi bi-cart"></i> Ver</a></td>`;
            tbody.appendChild(tr);
        });
    });

    // Probar Telegram
    document.getElementById('btnTestTelegram').addEventListener('click', async () => {
        const res = await fetch('/api/test_telegram', { method: 'POST' });
        const result = await res.json();
        alert(result.message);
    });

    // Cargar Historial al abrir el Modal
    document.getElementById('modalHistorial').addEventListener('show.bs.modal', async () => {
        const tbody = document.querySelector('#tablaHistorial tbody');
        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Cargando historial...</td></tr>';
        
        try {
            const res = await fetch('/api/historial');
            const data = await res.json();
            
            tbody.innerHTML = '';
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-warning">Aún no hay búsquedas registradas.</td></tr>';
                return;
            }
            
            data.forEach(reg => {
                let precioHTML = reg.mejor_precio !== "N/A" && reg.mejor_precio !== "Error de red" ? `${reg.mejor_precio} €` : reg.mejor_precio;
                tbody.innerHTML += `<tr>
                    <td class="small">${reg.fecha}</td>
                    <td class="text-center fw-bold">${reg.vuelos_encontrados}</td>
                    <td class="text-success fw-bold">${precioHTML}</td>
                </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Error al cargar el historial.</td></tr>';
        }
    });
</script>
</body>
</html>
