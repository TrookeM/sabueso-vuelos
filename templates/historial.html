<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Historial de Batidas | Sabueso</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR FILTERS -->
            <div class="col-lg-3 col-md-4 sidebar glass p-4">
                <div class="mb-4">
                    <a href="/" class="text-decoration-none text-light mb-3 d-inline-block">
                        <i class="bi bi-arrow-left-circle me-2"></i> Volver al Radar
                    </a>
                    <h3 class="fw-bold text-gradient"><i class="bi bi-clock-history"></i> Historial</h3>
                    <p class="text-muted small">Registro detallado de operaciones</p>
                </div>

                <div class="glass-card p-3 mb-4">
                    <h6 class="text-uppercase text-muted small fw-bold mb-3"><i class="bi bi-funnel"></i> Filtros</h6>

                    <div class="mb-3">
                        <label class="form-label small text-muted">Buscar</label>
                        <input type="text" id="filterSearch" class="form-control form-control-sm"
                            placeholder="Ciudad, país...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted">Modo</label>
                        <select id="filterMode" class="form-select form-select-sm">
                            <option value="all">Todos</option>
                            <option value="Manual">Manual</option>
                            <option value="Automático">Automático</option>
                            <option value="EXPLORADOR">Explorador</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted">Precio Máx (€)</label>
                        <input type="range" class="form-range" id="filterPrice" min="0" max="500" step="10">
                        <div class="d-flex justify-content-between small text-muted">
                            <span>0€</span>
                            <span id="priceVal">Indiferente</span>
                        </div>
                    </div>

                    <button class="btn btn-outline-danger w-100 mt-3" id="btnBorrarHistorialPage">
                        <i class="bi bi-trash"></i> Purgar Historial
                    </button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-lg-9 col-md-8 p-4">
                <div id="loadingHistory" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Cargando base de datos...</p>
                </div>

                <div id="historyContainer" class="row g-4 d-none">
                    <!-- Cards will be injected here -->
                </div>

                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="bi bi-journal-x fs-1 d-block mb-3 text-muted opacity-50"></i>
                    <p class="text-muted">No se encontraron registros.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHistorialPage();
        });
    </script>
</body>

</html>
